name: Build and Deploy to EdgeOne Pages

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edgeone-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.163.0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Verify Hugo
        run: hugo version

      - name: Build Site
        run: |
          hugo \
            --gc \
            --minify

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: |
          npx edgeone pages deploy ./public \
            -n "${{ vars.EDGEONE_PROJECT_NAME }}" \
            -t "${EDGEONE_API_TOKEN}"